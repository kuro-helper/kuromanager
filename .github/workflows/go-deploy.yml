name: Go Deploy

on:
  workflow_dispatch:
    inputs:
      kurohelperservice_ref:
        description: 'kurohelper-service 依賴使用的版本 ref'
        required: false
        type: string
        default: 'main'

permissions:
  contents: read
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      VPS_IP: ${{ secrets.VPS_IP }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
      VPS_DEPLOY_BASE: ${{ secrets.VPS_DEPLOY_BASE }}
    steps:
      - name: Check Secrets
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_IP VPS_USERNAME VPS_SSH_PASSWORD VPS_DEPLOY_BASE; do
            if [ -z "${!name:-}" ]; then
              echo "::error::缺少必要的 Secret：$name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  build:
    needs: preflight
    permissions:
      contents: read
      actions: write
    uses: kuro-helper/.github/.github/workflows/go-build.yml@main
    with:
      use_kurohelperservice: ${{ inputs.kurohelperservice_ref }}
      linux_binary_name: ${{ format('{0}-linux-amd64-{1}', github.event.repository.name, github.ref_name) }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      VPS_IP: ${{ secrets.VPS_IP }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
      VPS_DEPLOY_BASE: ${{ secrets.VPS_DEPLOY_BASE }}
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: dist

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload binary to VPS
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          output_name="$(ls -1 dist | head -n 1)"
          if [ -z "$output_name" ]; then
            echo "::error::找不到編譯產物"
            exit 1
          fi

          deploy_base="${VPS_DEPLOY_BASE%/}"
          target_path="${deploy_base}/${REPO_NAME}"

          ssh_opts="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          remote="${VPS_USERNAME}@${VPS_IP}"

          echo "部署 ref：${{ github.ref }} (${{ github.sha }})"
          echo "上傳執行檔：$output_name"

          sshpass -e scp $ssh_opts "dist/$output_name" "$remote:$target_path/"
          sshpass -e ssh $ssh_opts "$remote" "chmod u+x '$target_path/$output_name'"

          echo "已部署 $output_name ($REPO_NAME)"
